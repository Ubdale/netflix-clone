<div class="container-fluid web-body mt-4">
  <div class="shows-section">

    <div class="cards-section">
      <div class="row justify-content-center mb-4">
        <div class="col-lg-10">
          <h2 class="mb-4">Trending Now</h2>
          <div class="cards">
            <svg class="arrow arrow-left" (click)="trandingScrollLeft()" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 320 512">
              <path
                d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l192 192c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L77.3 256 246.6 86.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-192 192z">
              </path>
            </svg>
            <ul #trandingCards class="d-flex gap-1"> 
              <li *ngFor="let show of showsTranding" (click)="onTrandingShowClick(show)">
                <img [src]="show.showPic" [alt]="show.showName" />
              </li>
            </ul>
            <svg class="arrow arrow-right" (click)="trandingScrollRight()" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 320 512">
              <path
                d="M310.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L242.7 256 73.4 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z" />
            </svg>
          </div>
        </div>
      </div>
<div class="row justify-content-center"> 
        <div class="col-lg-10">
          <h2 class="mb-4">Recommendations</h2>
          <div class="cards">
            <svg class="arrow arrow-left" (click)="recommendedScrollLeft()" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 320 512">
              <path
                d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l192 192c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L77.3 256 246.6 86.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-192 192z">
              </path>
            </svg>
            <ul #recommendedCards class="d-flex gap-1">
              <li *ngFor="let show of recommendedShows" (click)="recommendedShowClick(show)">
                <img [src]="show.showPic" [alt]="show.showName" />
              </li>
            </ul>
            <svg class="arrow arrow-right" (click)="recommendedScrollRight()" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 320 512">
              <path
                d="M310.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L242.7 256 73.4 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z" />
            </svg>
          </div>
        </div>
      </div> 
    </div>
  </div>
</div>
