<div class="container-fluid web-body mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <h2 class="mb-4">Frequently Asked Questions</h2>
            <div ngbAccordion [closeOthers]="true">
                <ng-container>
                  <div
                  *ngFor="let content of accordian"
                  class="border-control mb-4"
                  (click)="toggleTransform(content)"
                  ngbAccordionItem
                >
                  <h2 ngbAccordionHeader>
                    <button ngbAccordionButton class="accordian-button">
                      {{ content.headerText }}
                      <img
                        class="ms-auto"
                        [ngClass]="{ 'rotated': content.isRotated, 'not-rotated': !content.isRotated }"
                        src="../../../assets/icons/accordian-icon.png"
                        alt=""
                      />
                    </button>
                  </h2>
                  <div ngbAccordionCollapse>
                    <div ngbAccordionBody class="accordian-body">
                      {{ content.bodyText }}
                    </div>
                  </div>
                </div>
                
                </ng-container>
              </div>                        
        </div>
    </div>
</div>
